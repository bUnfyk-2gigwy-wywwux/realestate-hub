# ============================================================
# Streamlit 앱 수면 방지 (Keep-Alive)
# 위치: .github/workflows/keepalive.yml  ← 반드시 이 경로
# 동작: 하루 3회 앱 URL에 접속 요청 → 무접속 상태 차단
# 실행 시각(KST): 09:00 / 17:00 / 01:00
# ============================================================
name: Streamlit Keep-Alive

on:
  schedule:
    - cron: "0 0,8,16 * * *"   # UTC 기준 (KST -9시간)
  workflow_dispatch:            # 수동 실행 버튼 (테스트용)

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit apps
        run: |
          set +e
          URLS=(
            "https://realestate-risk-screenerrealestate-risk-screener-bdlnggh8pipyk.streamlit.app"
            "https://gyeyang-tax.streamlit.app"
            # ▼ 추후 배포 시 주석 해제 후 URL 입력
            # "https://TODO-부동산AVM.streamlit.app"
            # "https://TODO-경매레이더.streamlit.app"
          )
          for url in "${URLS[@]}"; do
            code=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 90 "$url")
            echo "[$code] $url"
          done
          echo "완료: $(date '+%Y-%m-%d %H:%M') UTC"
